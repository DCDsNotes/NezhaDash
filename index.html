<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哪吒监控</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <link rel="icon" sizes="192x192" type="image/svg+xml" href="/android-chrome-192x192.svg">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#181f30" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nezha Monitoring" />

    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #181f30;
        z-index: 99999;
        transition: opacity 200ms ease;
      }
      #app-loading .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,.2);
        border-top-color: rgba(255,255,255,.8);
        animation: appSpin 900ms linear infinite;
      }
      @keyframes appSpin { to { transform: rotate(360deg); } }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loading" aria-hidden="true"><div class="spinner"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.9.1 or v0.9.1)"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve version/tag
        id: version
        shell: bash
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          input_version="${{ github.event.inputs.version }}"

          if [[ -n "${input_version}" ]]; then
            if [[ "${input_version}" == v* ]]; then
              tag="${input_version}"
              version="${input_version#v}"
            else
              tag="v${input_version}"
              version="${input_version}"
            fi
          else
            # For push to default branch: publish an auto build with timestamp tag.
            if [[ "${{ github.ref_type }}" == "branch" ]]; then
              build_ts="$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)"
              tag="v${build_ts}"
              version="${build_ts}"
              is_auto="true"
            else
              tag="v${pkg_version}"
              version="${pkg_version}"
              is_auto="false"
            fi
          fi

          # When triggered by a tag push, prefer the actual ref tag.
          if [[ "${{ github.ref_type }}" == "tag" && -n "${{ github.ref_name }}" ]]; then
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            is_auto="false"
          fi

           echo "tag=${tag}" >> "$GITHUB_OUTPUT"
           echo "version=${version}" >> "$GITHUB_OUTPUT"
           echo "is_auto=${is_auto:-false}" >> "$GITHUB_OUTPUT"
           # Publish as an official "Latest" release (not draft / not pre-release).
           echo "draft=false" >> "$GITHUB_OUTPUT"
           echo "prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        shell: bash
        run: |
          {
            echo "#### Changes"
            git log -20 --pretty=format:"%s"
            echo
            echo "-----------"
            echo "Artifact:"
            echo "- dist.zip"
          } > release_notes.md

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package dist.zip
        shell: bash
        run: zip -r dist.zip dist

      - name: Upload dist.zip (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.tag }}
          path: dist.zip
          if-no-files-found: error

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: Release ${{ steps.version.outputs.tag }}
          RELEASE_TARGET: ${{ github.sha }}
          RELEASE_DRAFT: ${{ steps.version.outputs.draft }}
          RELEASE_PRERELEASE: ${{ steps.version.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          flags=(--title "${RELEASE_NAME}" --notes-file release_notes.md --target "${RELEASE_TARGET}" --latest)
          if [[ "${RELEASE_DRAFT}" == "true" ]]; then
            flags+=(--draft)
          fi
          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            flags+=(--prerelease)
          fi

          for attempt in 1 2 3 4 5; do
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              gh release upload "${RELEASE_TAG}" dist.zip --clobber
              exit 0
            fi

            if gh release create "${RELEASE_TAG}" dist.zip "${flags[@]}"; then
              exit 0
            fi

            sleep_seconds=$((attempt * 20))
            echo "Release creation failed; retrying in ${sleep_seconds}s (${attempt}/5)."
            sleep "${sleep_seconds}"
          done

          gh release view "${RELEASE_TAG}" >/dev/null
          gh release upload "${RELEASE_TAG}" dist.zip --clobber
